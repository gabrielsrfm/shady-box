<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shady Box | Gerador de Sombras CSS</title>
    
    <link rel="stylesheet" href="src/css/style.css">
    
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>

    <main class="container">
        <header>
            <h1>Shady Box </h1>
            <p>Ajuste os sliders e copie o código da sua sombra</p>
        </header>

        <section class="generator-area">
            <aside class="controls">
                <div class="input-group">
                    <label for="h-shadow">Horizontal</label>
                    <input type="range" id="h-shadow" min="-50" max="50" value="10">
                </div>

                <div class="input-group">
                    <label for="v-shadow">Vertical</label>
                    <input type="range" id="v-shadow" min="-50" max="50" value="10">
                </div>
                
                </aside>

            <article class="preview-container">
                <div id="preview"></div>
            </article>
        </section>

        <section class="output-container">
            <code id="code-output">box-shadow: 10px 10px 15px rgba(0,0,0,0.3);</code>
            <button id="copy-btn">Copiar Código</button>
        </section>
    </main>

    <script src="src/js/script.js"></script>
</body>
</html>
