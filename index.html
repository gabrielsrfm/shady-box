<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shady Box | Box Shadow Generator</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div class="main-container">
        <aside class="settings-panel">
            <h2>Configurações</h2>
            
            <div class="control-group">
                <label>Deslocamento Horizontal</label>
                <input type="range" id="h-shadow" min="-100" max="100" value="10">
            </div>

            <div class="control-group">
                <label>Deslocamento Vertical</label>
                <input type="range" id="v-shadow" min="-100" max="100" value="10">
            </div>

            <div class="control-group">
                <label>Desfoque (Blur)</label>
                <input type="range" id="blur-shadow" min="0" max="100" value="15">
            </div>

            <div class="control-group">
                <label>Espalhamento (Spread)</label>
                <input type="range" id="spread-shadow" min="-50" max="50" value="0">
            </div>

            <div class="control-group">
                <label>Cor da Sombra</label>
                <input type="color" id="color-shadow" value="#000000">
            </div>
        </aside>

        <main class="preview-panel">
            <div id="preview-box"></div>
            
            <div class="code-box">
                <code id="code-output">box-shadow: 10px 10px 15px 0px rgba(0,0,0,0.5);</code>
                <button id="copy-btn">Copiar</button>
            </div>
        </main>
    </div>

    <script src="src/js/script.js"></script>
</body>
</html>
